name: 🚀 Deploy Pochi Bot

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  NODE_ENV: Production

jobs:
  test:
    name: 🧪 Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🏗️ Build project
        run: bun run build

      - name: ✅ Build completed
        run: echo "Build successful!"

  deploy:
    name: 🚀 Deploy to VPS
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    steps:
      - name: 🚀 Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          # host_fingerprint: ${{ secrets.VPS_FINGERPRINT }}  
          script_stop: true
          envs: GIT_BRANCH=${{ github.ref_name }},BOT_PATH=${{ secrets.BOT_PATH }}
          script: |
            set -euo pipefail
            echo "🚀 Iniciando deploy do Pochi Bot..."

            # Caminho (com fallback)
            BOT_DIR="${BOT_PATH:-/home/bot/pochi-bot}"
            cd "$BOT_DIR"

            echo "💾 Backup compacto..."
            ts="$(date +%Y%m%d-%H%M%S)"
            tar --exclude='./node_modules' --exclude='./.git' --exclude='./dist' -czf "../backup-pochi-$ts.tar.gz" . || true

            echo "📥 Atualizando código (branch: ${GIT_BRANCH})..."
            git fetch origin
            git reset --hard "origin/${GIT_BRANCH}"

            echo "📦 Instalando dependências..."
            bun install --frozen-lockfile

            echo "🏗️ Build..."
            bun run build

            echo "🔄 PM2 reload..."
            # zero-downtime se possível
            pm2 describe pochi-bot >/dev/null 2>&1 && pm2 reload pochi-bot || pm2 start dist/main.js --name pochi-bot
            pm2 save

            echo "✅ Status:"
            pm2 status

            echo "🎉 Deploy concluído!"
      - name: 📢 Notify Discord
        if: always()
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            🚀 **Deploy do Pochi Bot**
            **Status:** ${{ job.status }}
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            **Autor:** ${{ github.actor }}
            ${{ job.status == 'success' && '✅ Deploy realizado com sucesso!' || '❌ Deploy falhou!' }}
