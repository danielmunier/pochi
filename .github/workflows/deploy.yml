name: 🚀 Deploy Pochi to VPS

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README*.md'
      - 'README-en*.md'
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

env:
  NODE_ENV: Production

jobs:
  test:
    name: 🧪 Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🏗️ Build project
        run: bun run build

      - name: ✅ Build completed
        run: echo "Build successful!"

  deploy:
    name: 🚀 Deploy to VPS
    environment: Production
    needs: test
    runs-on: ubuntu-latest
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      !contains(github.event.head_commit.message, '[skip-deploy]') &&
      !contains(github.event.head_commit.message, '[docs]')
    steps:
      - name: 🚀 Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          envs: GIT_BRANCH=${{ github.ref_name }},BOT_PATH=${{ secrets.BOT_PATH }}
          script: |
            set -eo pipefail
            echo "🚀 Iniciando deploy do Pochi Bot..."

            echo "🔍 Debug - BOT_PATH recebido: '${BOT_PATH:-NÃO_DEFINIDO}'"
            echo "🔍 Debug - GIT_BRANCH: '${GIT_BRANCH:-NÃO_DEFINIDO}'"
            echo "🔍 Debug - PWD atual: $(pwd)"
            echo "🔍 Debug - Listando /home:"
            ls -la /home/ || echo "Erro ao listar /home"

            BOT_DIR="${BOT_PATH:-/home/ubuntu/pochi}"
            echo "🔍 Debug - BOT_DIR final: '$BOT_DIR'"
            echo "🔍 Debug - Verificando se diretório existe:"
            ls -la "$BOT_DIR" || echo "Diretório não encontrado: $BOT_DIR"
            
            cd "$BOT_DIR"

            echo "💾 Backup compacto..."
            ts="$(date +%Y%m%d-%H%M%S)"
            tar --exclude='./node_modules' --exclude='./.git' --exclude='./dist' -czf "../backup-pochi-$ts.tar.gz" . || true

            BRANCH="${GIT_BRANCH:-main}"
            echo "📥 Atualizando código (branch: ${BRANCH})..."
            git fetch origin
            git reset --hard "origin/${BRANCH}"

            echo "📦 Instalando dependências..."
            # Só reinstala se package.json ou bun.lock mudaram
            if git diff --name-only HEAD@{1} HEAD | grep -qE 'package\.json|bun\.lock'; then
              echo "📦 Dependências atualizadas, instalando..."
              bun install --frozen-lockfile
            else
              echo "✅ Nenhuma mudança em dependências, pulando bun install."
            fi

            echo "🏗️ Build..."
            bun run build

            echo "📦 Verificando Node.js..."
            if ! command -v node >/dev/null 2>&1; then
              if command -v sudo >/dev/null 2>&1; then
                echo "🚀 Instalando Node.js..."
                curl -fsSL https://deb.nodesource.com/setup_lts.x | sudo -E bash - || echo "NodeSource já configurado"
                sudo apt-get install -y nodejs || echo "Node.js já instalado"
              else
                echo "⚠️ Node.js não encontrado e sudo indisponível. Pulando instalação."
              fi
            else
              echo "✅ Node.js já instalado: $(node -v)"
            fi

            echo "📦 Verificando PM2..."
            if ! command -v pm2 >/dev/null 2>&1; then
              echo "🚀 Instalando PM2 globalmente..."
              bun install -g pm2 || echo "Falha ao instalar PM2 com bun"
            else
              echo "✅ PM2 já instalado: $(pm2 -v)"
            fi

            export PATH="/home/ubuntu/snap/bun-js/77/.bun/bin:$PATH"
            echo "🔍 PM2 path: $(which pm2 || echo 'PM2 não encontrado no PATH')"

            echo "🔄 PM2 reload..."
            pm2 describe pochi-bot >/dev/null 2>&1 && \
              pm2 reload pochi-bot || \
              pm2 start dist/main.js --name pochi-bot --interpreter bun
            pm2 save

            echo "✅ Status:"
            pm2 status

            echo "🎉 Deploy concluído!"

      - name: 📢 Notify Discord
        if: always()
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            🚀 **Deploy do Pochi Bot**
            **Status:** ${{ job.status }}
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            **Autor:** ${{ github.actor }}
            ${{ job.status == 'success' && '✅ Deploy realizado com sucesso!' || '❌ Deploy falhou!' }}
