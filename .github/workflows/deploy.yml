name: 🚀 Deploy Pochi to VPS

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README*.md'
      - 'README-en*.md'
      - 'docs/**'
      - '*.md'
  workflow_dispatch:

env:
  NODE_ENV: Production

jobs:
  test:
    name: 🧪 Test & Build
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔧 Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: 📦 Install dependencies
        run: bun install --frozen-lockfile

      - name: 🏗️ Build project
        run: bun run build

      - name: ✅ Build completed
        run: echo "Build successful!"

  deploy:
    name: 🚀 Deploy to VPS
    environment: Production
    needs: test
    runs-on: ubuntu-latest
    if: |
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      !contains(github.event.head_commit.message, '[skip-deploy]') &&
      !contains(github.event.head_commit.message, '[docs]')
    steps:
      - name: 🚀 Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          script: |
            set -eo pipefail
            echo "🚀 Iniciando deploy do Pochi Bot..."

            # Caminho fixo padrão — sem variáveis extras no GitHub
            BOT_DIR="/home/ubuntu/pochi"
            BRANCH="${GITHUB_REF_NAME:-main}"

            echo "🔍 BOT_DIR: $BOT_DIR"
            echo "🔍 Branch: $BRANCH"

            cd "$BOT_DIR" || { echo "❌ Diretório não encontrado: $BOT_DIR"; exit 1; }

            echo "💾 Backup compacto..."
            ts="$(date +%Y%m%d-%H%M%S)"
            tar --exclude='./node_modules' --exclude='./.git' --exclude='./dist' -czf "../backup-pochi-$ts.tar.gz" . || true

            echo "📥 Atualizando código..."
            git fetch origin
            git reset --hard "origin/${BRANCH}"

            echo "📦 Instalando dependências..."
            bun install --frozen-lockfile

            echo "🏗️ Build..."
            bun run build

            # ✅ Node.js check e instalação segura (sem sudo obrigatório)
            echo "📦 Verificando Node.js..."
            if ! command -v node >/dev/null 2>&1; then
              echo "🧩 Node.js não encontrado. Tentando instalar (LTS)..."
              if curl -fsSL https://deb.nodesource.com/setup_lts.x | bash -; then
                apt-get install -y nodejs || echo "⚠️ Falha ao instalar Node.js (sem sudo). Verifique permissões."
              else
                echo "⚠️ Não foi possível configurar NodeSource. Node.js não será atualizado."
              fi
            else
              echo "✅ Node.js já está instalado: $(node -v)"
            fi

            # ✅ PM2 check e instalação segura
            echo "📦 Verificando PM2..."
            if ! command -v pm2 >/dev/null 2>&1; then
              echo "🧩 PM2 não encontrado. Instalando via Bun..."
              bun install -g pm2 || echo "⚠️ Falha ao instalar PM2. Verifique permissões."
            else
              echo "✅ PM2 já está instalado: $(pm2 -v)"
            fi

            # Ajuste de PATH
            export PATH="/home/ubuntu/snap/bun-js/77/.bun/bin:$PATH"
            echo "🔍 PM2 path: $(which pm2 || echo 'PM2 não encontrado')"
            echo "🔍 Node version: $(node --version || echo 'Node não encontrado')"

            echo "🔄 PM2 reload..."
            pm2 describe pochi-bot >/dev/null 2>&1 && pm2 reload pochi-bot || pm2 start dist/main.js --name pochi-bot --interpreter bun
            pm2 save

            echo "✅ Status:"
            pm2 status

            echo "🎉 Deploy concluído!"

      - name: 📢 Notify Discord
        if: always()
        uses: Ilshidur/action-discord@master
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        with:
          args: |
            🚀 **Deploy do Pochi Bot**
            **Status:** ${{ job.status }}
            **Branch:** ${{ github.ref_name }}
            **Commit:** ${{ github.sha }}
            **Autor:** ${{ github.actor }}
            ${{ job.status == 'success' && '✅ Deploy realizado com sucesso!' || '❌ Deploy falhou!' }}
